<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>Setup Profile - Grid Hub</title>
  <link rel="stylesheet" href="css/setup-profile.css">
  <link rel="preconnect"
  href="https://fonts.googleapis.com">
  <link rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap"
  rel="stylesheet">
</head>

<body>

  <div class="profile-overlay"></div>

  <section class="setup-container">

    <div class="banner-area">

      <img
      id="bannerPreview"
      src="assets/default-banner.jpg">

      <label
      for="bannerInput"
      class="change-banner">

      ALTERAR BANNER

      </label>

      <input
      type="file"
      id="bannerInput"
      accept="image/*">

    </div>

    <div class="profile-content">

      <div class="profile-photo-area">

        <img
        id="profilePreview"
        src="assets/default-profile.png">

        <label
        for="profileInput"
        class="change-photo">

        +

        </label>

        <input
        type="file"
        id="profileInput"
        accept="image/*">

      </div>

      <div class="profile-info">

        <input
        type="text"
        id="username"
        placeholder="NICKNAME">

        <textarea
        id="bio"
        placeholder="BIO"></textarea>

        <select id="country">

          <option>Brasil</option>
          <option>Japan</option>
          <option>USA</option>
          <option>Germany</option>
          <option>UK</option>

        </select>

        <input
        type="text"
        id="mainCar"
        placeholder="CARRO PRINCIPAL">

        <div class="team-box">

          <input
          type="text"
          id="teamName"
          placeholder="NOME DA TEAM">

          <input
          type="password"
          id="teamPassword"
          placeholder="SENHA DA TEAM">

        </div>

        <button id="saveProfile">

          SALVAR PERFIL

        </button>

      </div>

    </div>

  </section>

  <script type="module"
  src="js/setup-profile.js"></script>

</body>

</html>
