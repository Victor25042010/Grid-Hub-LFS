<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Hub LFS</title>
<link rel="stylesheet" href="index.css">
</head>
<body>
<div class="video-bg">
    <iframe
        src="https://www.youtube.com/embed/nJzQmSfx3Io?autoplay=1&mute=1&loop=1&playlist=nJzQmSfx3Io&controls=0&showinfo=0"
        frameborder="0"
        allow="autoplay"
    ></iframe>
</div>

<div class="overlay"></div>
<div class="hero">

    <h1>GRID HUB LFS</h1>

    <p>
        A comunidade definitiva do Live for Speed.
        Conecte-se com pilotos, participe de eventos,
        poste seus carros e domine as pistas.
    </p>

    <button onclick="openModal()">
        Entrar na Comunidade
    </button>

</div>
<div class="modal" id="modal">

<div class="box">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button class="primary" onclick="login()">
Entrar
</button>

<button class="secondary" onclick="register()">
Criar Conta
</button>

<button class="secondary" onclick="closeModal()">
Fechar
</button>

</div>

</div>
<div class="credit">
Vídeo por: nJzQmSfx3Io (YouTube)
</div>

<script>

let modal = document.getElementById("modal");

function openModal() {
    modal.style.display = "flex";
}

function closeModal() {
    modal.style.display = "none";
}
const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_AUTH_DOMAIN",
    projectId: "SEU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
function login() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(() => {
        window.location.href = "home.html";
    })
    .catch(err => alert("Erro no login"));

}
function register() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
        window.location.href = "home.html";
    })
    .catch(err => alert("Erro ao criar conta"));

}

</script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

</body>
</html>
