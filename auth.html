<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Grid Hub</title>
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

  <div class="video-container">
    <iframe
      src="https://www.youtube.com/embed/1Qzl1eCr60s?autoplay=1&mute=1&controls=0&loop=1&playlist=1Qzl1eCr60s&rel=0&modestbranding=1"
      title="Vídeo de Fundo"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <div class="register-box">

    <h1>CRIAR CONTA</h1>

    <input type="text" id="username" placeholder="Nick do LFS">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Senha">

    <a href="login.html" id="registerBtn">Criar Conta</a>

<p class="login-link">
    Já tem uma conta?
    <a href="login.html">Entrar</a>
</p>

  </div>


  <div class="credits">
    Background Video by
    <a href="https://www.youtube.com/@Evndr" target="_blank">
      Evandro
    </a>
  </div>

  <script type="module" src="js/auth.js"></script>

</body>

</html>
